image:
  name: hashicorp/terraform:1.7.5
  entrypoint: [""]

stages:
  - validate
  - plan
  - apply
  - destroy

variables:
  TF_ROOT: ${CI_PROJECT_DIR}
  TF_PLAN: tfplan
  ENV: dev

before_script:
  - cd ${TF_ROOT}
  - terraform --version
  - terraform init

cache:
  paths:
    - ${TF_ROOT}/.terraform

############################################
# VALIDATE
############################################

validate:
  stage: validate
  script:
    - terraform validate

############################################
# PLAN
############################################

plan:
  stage: plan
  script:
    - terraform plan
      -var-file=environments/${ENV}.tfvars
      -out=${TF_PLAN}
  artifacts:
    paths:
      - ${TF_ROOT}/${TF_PLAN}
    expire_in: 1 day
  rules:
    - if: $ENV

############################################
# APPLY (Manual Approval)
############################################

apply:
  stage: apply
  script:
    - terraform apply -input=false ${TF_PLAN}
  dependencies:
    - plan
  when: manual
  rules:
    - if: $ENV

############################################
# DESTROY (Manual)
############################################

destroy:
  stage: destroy
  script:
    - terraform destroy
      -var-file=environments/${ENV}.tfvars
      -auto-approve
  when: manual
  rules:
    - if: $DESTROY == "true"
