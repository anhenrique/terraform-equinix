image:
  name: hashicorp/terraform:1.7.5
  entrypoint: [""]

stages:
  - validate
  - plan
  - apply

variables:

  TF_ROOT: ${CI_PROJECT_DIR}

  TF_STATE_NAME: ${CI_ENVIRONMENT_NAME}

  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"

  TF_HTTP_ADDRESS: "${TF_ADDRESS}"
  TF_HTTP_LOCK_ADDRESS: "${TF_ADDRESS}/lock"
  TF_HTTP_UNLOCK_ADDRESS: "${TF_ADDRESS}/lock"

  TF_HTTP_LOCK_METHOD: "POST"
  TF_HTTP_UNLOCK_METHOD: "DELETE"

  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"

  TF_IN_AUTOMATION: "true"

cache:
  key: ${CI_ENVIRONMENT_NAME}
  paths:
    - .terraform/

before_script:
  - cd ${TF_ROOT}
  - terraform --version

############################################################
# VALIDATE
############################################################

validate:
  stage: validate
  script:
    - terraform init -input=false -reconfigure
    - terraform validate

############################################################
# DEV
############################################################

plan-dev:
  stage: plan
  environment:
    name: dev
  script:
    - terraform init -input=false -reconfigure
    - terraform plan -input=false \
        -var-file=environments/dev.tfvars \
        -out=tfplan

apply-dev:
  stage: apply
  environment:
    name: dev
  script:
    - terraform init -input=false -reconfigure
    - terraform apply -input=false \
        -var-file=environments/dev.tfvars \
        -auto-approve
  only:
    - develop

############################################################
# HOMOLOGAÇÃO
############################################################

plan-hml:
  stage: plan
  environment:
    name: hml
  script:
    - terraform init -input=false -reconfigure
    - terraform plan -input=false \
        -var-file=environments/hml.tfvars \
        -out=tfplan

apply-hml:
  stage: apply
  environment:
    name: hml
  script:
    - terraform init -input=false -reconfigure
    - terraform apply -input=false \
        -var-file=environments/hml.tfvars \
        -auto-approve
  only:
    - homolog

############################################################
# PRODUÇÃO (MANUAL APPROVAL)
############################################################

plan-prod:
  stage: plan
  environment:
    name: prod
  script:
    - terraform init -input=false -reconfigure
    - terraform plan -input=false \
        -var-file=environments/prod.tfvars \
        -out=tfplan
  only:
    - main

apply-prod:
  stage: apply
  environment:
    name: prod
  script:
    - terraform init -input=false -reconfigure
    - terraform apply -input=false \
        -var-file=environments/prod.tfvars \
        -auto-approve
  when: manual
  only:
    - main