image:
  name: hashicorp/terraform:1.7.5
  entrypoint: [""]

stages:
  - init
  - validate
  - plan
  - apply

variables:
  TF_ROOT: "."
  # DEFAULT ENV se CI_ENVIRONMENT_NAME estiver vazio
  ENV: "${CI_ENVIRONMENT_NAME}"
  # fallback para dev se ENV estiver vazio (GitLab não expande ${VAR:-default} em fields)
  ENV_DEFAULT: "dev"
  # Decide qual usar: se ENV vazio, usa ENV_DEFAULT
  ENV_RESOLVED: "${ENV}"
  TF_STATE_NAME: "${ENV_RESOLVED}"
  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"

  TF_HTTP_ADDRESS: "${TF_ADDRESS}"
  TF_HTTP_LOCK_ADDRESS: "${TF_ADDRESS}/lock"
  TF_HTTP_UNLOCK_ADDRESS: "${TF_ADDRESS}/lock"
  TF_HTTP_LOCK_METHOD: "POST"
  TF_HTTP_UNLOCK_METHOD: "DELETE"
  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"
  TF_IN_AUTOMATION: "true"
  

before_script:
  - cd ${TF_ROOT}
  # Resolve ENV se estiver vazio (shell expansion aqui funciona)
  - |
    if [ -z "${ENV}" ]; then
      export ENV="${ENV_DEFAULT}"
    fi
    export TF_STATE_NAME="${ENV}"
    export TF_HTTP_ADDRESS="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
    export TF_HTTP_LOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
    export TF_HTTP_UNLOCK_ADDRESS="${TF_HTTP_ADDRESS}/lock"
    export TF_HTTP_USERNAME="gitlab-ci-token"
    export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
  - terraform --version

init:
  stage: init
  script:
    - terraform init -input=false -reconfigure

validate:
  stage: validate
  script:
    - terraform init -input=false -reconfigure
    - terraform fmt -check || true
    - terraform validate

plan:
  stage: plan
  environment:
    name: "${ENV_DEFAULT}"
  script:
    - echo "DEBUG VARS:"
    - env | grep TF_VAR
    - echo "ENV=${ENV_DEFAULT}"
    - ls -la environments || true
    - test -f "environments/${ENV}.tfvars" || (echo "Arquivo environments/${ENV}.tfvars não encontrado" && exit 1)
    - terraform init -input=false -reconfigure
    - terraform plan -input=false -out=tfplan  -var="vcd_api_token=${TF_VAR_vcd_api_token}" -var-file="environments/${ENV}.tfvars"
  artifacts:
    paths:
      - tfplan
    expire_in: 2h

apply:
  stage: apply
  environment:
    name: "${ENV}"
  dependencies:
    - plan
  when: manual
  script:
    - terraform init -input=false -reconfigure 
    - |
      if terraform apply -input=false tfplan; then
        echo "Apply ok"
      else
        echo "Plan stale ou erro — recriando plan e aplicando"
        terraform plan -input=false -out=tfplan -var-file="environments/${ENV}.tfvars"
        terraform apply -input=false tfplan
      fi