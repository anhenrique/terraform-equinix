image: hashicorp/terraform:1.7.5

variables:
  TF_ROOT: .
  TF_STATE_NAME: terraform-state
  TF_ADDRESS: "https://gitlab-hs.hsprevent.com.br/api/v4/projects/387/terraform/state/default"

stages:
  - init
  - plan
  - apply

before_script:
  - export TF_HTTP_ADDRESS="${TF_ADDRESS}"
  - export TF_HTTP_LOCK_ADDRESS="${TF_ADDRESS}/lock"
  - export TF_HTTP_UNLOCK_ADDRESS="${TF_ADDRESS}/lock"
  - export TF_HTTP_LOCK_METHOD="POST"
  - export TF_HTTP_UNLOCK_METHOD="DELETE"
  - export TF_HTTP_USERNAME="gitlab-ci-token"
  - export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"

init:
  stage: init
  script:
    - terraform init -input=false -reconfigure

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan

apply:
  stage: apply
  script:
    - terraform apply -input=false tfplan
  when: manual
