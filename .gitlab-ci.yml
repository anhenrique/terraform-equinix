image:
  name: hashicorp/terraform:1.7.5
  entrypoint: [""]

stages:
  - validate
  - plan
  - apply

# Valores padrão (ajuste se quiser)
variables:
  TF_ROOT: "."
  # por padrão pega o environment do job; se vazio, usa "dev" (você pode setar ENV ao rodar pipeline)
  ENV: "${CI_ENVIRONMENT_NAME}"
  TF_STATE_NAME: "${ENV}"
  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"

  # backend HTTP (usado pelo Terraform via TF_HTTP_*)
  TF_HTTP_ADDRESS: "${TF_ADDRESS}"
  TF_HTTP_LOCK_ADDRESS: "${TF_ADDRESS}/lock"
  TF_HTTP_UNLOCK_ADDRESS: "${TF_ADDRESS}/lock"
  TF_HTTP_LOCK_METHOD: "POST"
  TF_HTTP_UNLOCK_METHOD: "DELETE"
  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"

  TF_IN_AUTOMATION: "true"

# cache por branch/environment (reduz conflitos)
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .terraform/

before_script:
  - cd ${TF_ROOT}
  - export TF_HTTP_ADDRESS="${TF_ADDRESS}"
  - export TF_HTTP_LOCK_ADDRESS="${TF_ADDRESS}/lock"
  - export TF_HTTP_UNLOCK_ADDRESS="${TF_ADDRESS}/lock"
  - export TF_HTTP_LOCK_METHOD="POST"
  - export TF_HTTP_UNLOCK_METHOD="DELETE"
  - export TF_HTTP_USERNAME="gitlab-ci-token"
  - export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
  - terraform --version

###############################################################################
# Validate: formatação + validate
###############################################################################
validate:
  stage: validate
  script:
    - terraform init -input=false -reconfigure
    - terraform fmt -check
    - terraform validate

###############################################################################
# Plan: geramos o tfplan (por ambiente). ARTIFACT usado pelo apply.
###############################################################################
plan:
  stage: plan
  environment:
    name: "${ENV}"
  script:
    # reinit para garantir backend e workspace corretos
    - terraform init -input=false -reconfigure
    # opcional: selecionar ou criar workspace, se você usa workspaces por env
    - |
      if terraform workspace select "${ENV}" 2>/dev/null; then
        echo "workspace ${ENV} selected"
      else
        terraform workspace new "${ENV}" || true
      fi
    - terraform plan -input=false -out=tfplan -var-file="environments/${ENV}.tfvars"
  artifacts:
    name: "tfplan-${CI_COMMIT_REF_SLUG}-${ENV}"
    paths:
      - tfplan
    expire_in: 2h

###############################################################################
# Apply: manual (safety). Usa artifact do plan; se estiver stale, refaz o plan.
###############################################################################
apply:
  stage: apply
  environment:
    name: "${ENV}"
  dependencies:
    - plan
  when: manual
  script:
    - terraform init -input=false -reconfigure
    # tenta aplicar o plano; se for stale, recria o plan e aplica
    - |
      if terraform apply -input=false tfplan; then
        echo "Apply successful"
      else
        echo "Saved plan stale or failed — recreating plan and applying"
        terraform plan -input=false -out=tfplan -var-file="environments/${ENV}.tfvars"
        terraform apply -input=false tfplan
      fi