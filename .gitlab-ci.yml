image: hashicorp/terraform:light

stages:
  - validate
  - plan
  - apply

variables:
  TF_ROOT: terraform

before_script:
  - cd $TF_ROOT
  - terraform init

validate:
  stage: validate
  script:
    - terraform validate

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - $TF_ROOT/tfplan

apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
