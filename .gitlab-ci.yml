image:
  name: hashicorp/terraform:1.7.5
  entrypoint: [""]

stages:
  - init
  - validate
  - plan
  - apply

variables:

  TF_ROOT: ${CI_PROJECT_DIR}

  TF_STATE_NAME: ${CI_ENVIRONMENT_NAME}

  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"

  TF_HTTP_ADDRESS: "${TF_ADDRESS}"
  TF_HTTP_LOCK_ADDRESS: "${TF_ADDRESS}/lock"
  TF_HTTP_UNLOCK_ADDRESS: "${TF_ADDRESS}/lock"

  TF_HTTP_LOCK_METHOD: "POST"
  TF_HTTP_UNLOCK_METHOD: "DELETE"

  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"

  TF_IN_AUTOMATION: "true"

cache:
  key: terraform
  paths:
    - .terraform/

before_script:
  - cd ${TF_ROOT}
  - terraform --version

init:
  stage: init
  script:
    - terraform init -input=false -reconfigure

validate:
  stage: validate
  script:
    - terraform validate

plan:
  stage: plan
  script:
    - terraform plan -input=false -out=tfplan -var-file=environments/${CI_ENVIRONMENT_NAME}.tfvars
  artifacts:
    paths:
      - tfplan

apply:
  stage: apply
  script:
    - terraform apply -input=false tfplan
  when: manual
  environment:
    name: ${CI_ENVIRONMENT_NAME}