name: 'Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch: 
env: 
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_vcd_api_token: ${{ secrets.TF_VAR_vcd_api_token}}

permissions:
  contents: read

jobs:
  validate:
    name: 'Terraform'
    runs-on: ubuntu-latest
    container: hashicorp/terraform:1.14.8
    

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4
    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      run: terraform init -input=false -reconfigure

    # Checks that all Terraform configuration files adhere to a canonical format
    - name: Terraform Format and Validate
      run: terraform fmt -check || true
           terraform validate
           
  plan:
    needs: validate
    runs-on: ubuntu-latest
    container: hashicorp/terraform:1.14.8
    steps:
      - uses: actions/checkout@v4
      - name: Create Plan
        run: |
          terraform init -input=false -reconfigure
          terraform plan -input=false -out=tfplan -var-file="environments/develop.tfvars"
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: production # Exige aprovação manual se configurado no repositório
    container: hashicorp/terraform:1.14.8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tfplan
      - name: Terraform Apply
        run: |
          terraform init -input=false -reconfigure
          terraform apply -input=false tfplan